# 시나리오: HPA는 있지만 설정이 느슨한 서비스 (tuned-hpa 고득점 예상)
# 기대 결과: tuned-hpa 1위, 여러 change 제안 출력
# - minReplicas 너무 낮음
# - CPU target 너무 높음
# - readiness period 느림
# - 시작 지연 큼

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

resources:
  requests:
    cpu: 200m
    memory: 256Mi

deployment:
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
  preStopSleepSeconds: 0
  terminationGracePeriodSeconds: 30

app:
  startupDelaySeconds: 12
  shutdownDrainSeconds: 0

pdb:
  enabled: false

replicaCount: 1
