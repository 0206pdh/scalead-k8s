apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: demo-app
          image: demo-app:latest
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 800m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          env:
            - name: APP_STARTUP_DELAY_SECONDS
              value: "6"
            - name: APP_SHUTDOWN_DRAIN_SECONDS
              value: "8"
