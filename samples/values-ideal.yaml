# 시나리오: 잘 설정된 서비스 (basic-hpa 고득점 예상)
# 기대 결과: basic-hpa 1위, 감사 항목 대부분 ok

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 60

resources:
  requests:
    cpu: 300m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

deployment:
  readinessProbe:
    initialDelaySeconds: 2
    periodSeconds: 3
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
  preStopSleepSeconds: 5
  terminationGracePeriodSeconds: 30

app:
  startupDelaySeconds: 2
  shutdownDrainSeconds: 3

pdb:
  enabled: true
  minAvailable: 2

serviceMonitor:
  enabled: false

replicaCount: 3
